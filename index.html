<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diario Verde">
<meta name="theme-color" content="#1a1208">
<title>Diario Verde 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf6;
    --dark: #2c2416;
    --gold: #c8a84b;
    --muted: #8a7050;
    --border: #e8dfc8;
    --border2: #d4c99a;
    --accent-bg: rgba(200,168,75,0.12);
    --header: rgba(26,18,8,0.97);
    --red: #c0392b;
    --green: #5a7a3a;
    --orange: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'Lora', Georgia, serif; color: var(--dark); }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  /* HEADER */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: var(--header); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(200,168,75,0.15);
    padding: env(safe-area-inset-top, 0) 0 0;
  }
  .header-inner {
    max-width: 640px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-kanji { font-size: 18px; color: var(--gold); font-weight: 700; letter-spacing: 2px; }
  .logo-text { font-size: 15px; color: #e8d8b0; font-weight: 600; letter-spacing: 1px; }
  .btn-back {
    background: none; border: none; color: var(--gold);
    font-size: 14px; padding: 4px 0; min-width: 70px;
  }
  .btn-add {
    background: var(--gold); color: #1a1208; border: none;
    border-radius: 20px; padding: 7px 15px; font-size: 13px;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .spacer { min-width: 70px; }

  /* MAIN */
  main {
    max-width: 640px; margin: 0 auto;
    padding-top: calc(60px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px));
    padding-left: 12px; padding-right: 12px;
  }

  /* VIEWS */
  .view { display: none; animation: fadeIn 0.2s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* FILTERS */
  .filter-row { display: flex; gap: 8px; padding: 14px 0 16px; flex-wrap: wrap; }
  .chip {
    background: var(--card); border: 1.5px solid rgba(200,168,75,0.25);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #5a4020;
    transition: all 0.18s;
  }
  .chip.active { background: var(--gold); color: #1a1208; border-color: var(--gold); font-weight: 700; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 12px; }
  .card {
    background: var(--card); border-radius: 16px;
    box-shadow: 0 2px 12px rgba(90,60,10,0.09);
    border: 1px solid rgba(200,168,75,0.16); overflow: hidden;
    cursor: pointer; transition: transform 0.18s, box-shadow 0.18s;
    -webkit-user-select: none;
  }
  .card:active { transform: scale(0.97); }
  .card-img {
    height: 118px; background: #e8dfc8; position: relative;
    display: flex; align-items: center; justify-content: center; font-size: 46px;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .cat-badge {
    position: absolute; top: 6px; right: 6px;
    background: rgba(26,18,8,0.72); color: #e8d8b0;
    font-size: 9px; padding: 2px 7px; border-radius: 10px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .card-body { padding: 10px 12px 12px; }
  .card-nome { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .card-specie { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 6px; }
  .card-ultimo { font-size: 11px; color: #5a4020; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* EMPTY */
  .empty { text-align: center; padding: 70px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .empty-icon { font-size: 58px; }
  .empty-text { color: var(--muted); line-height: 1.6; font-size: 15px; }

  /* DETAIL */
  .hero { border-radius: 20px; overflow: hidden; margin-bottom: 20px; position: relative; min-height: 200px; }
  .hero-placeholder {
    width: 100%; height: 230px;
    background: linear-gradient(135deg, #d4c99a, #8fa870);
    display: flex; align-items: center; justify-content: center; font-size: 84px;
  }
  .hero img { width: 100%; height: 230px; object-fit: cover; display: block; }
  .hero-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(20,14,4,0.86));
    padding: 50px 18px 16px;
  }
  .hero-cat { font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 3px; font-weight: 700; text-transform: uppercase; }
  .hero-nome { font-size: 24px; font-weight: 700; color: #fff; line-height: 1.2; }
  .hero-specie { font-size: 13px; color: #c8b880; font-style: italic; }
  .hero-data { font-size: 11px; color: #a09070; margin-top: 4px; }

  .section { margin-bottom: 22px; }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }

  .cure-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
  .cure-card {
    background: var(--card); border-radius: 12px; padding: 10px 3px;
    text-align: center; border: 1px solid var(--border);
  }
  .cure-emoji { font-size: 20px; margin-bottom: 3px; }
  .cure-tipo { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .cure-data { font-size: 10px; color: var(--dark); font-weight: 600; }

  .note-box {
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--border); font-size: 14px; color: #5a4020; line-height: 1.6;
  }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; }
  .tl-item { display: flex; gap: 12px; position: relative; padding-bottom: 10px; }
  .tl-item:not(:last-child)::before {
    content: ''; position: absolute; left: 16px; top: 38px;
    width: 2px; bottom: 0; background: var(--border);
  }
  .tl-dot {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; border: 2px solid rgba(200,168,75,0.25); margin-top: 2px;
  }
  .tl-content {
    flex: 1; background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
  }
  .tl-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; cursor: pointer;
  }
  .tl-tipo { font-size: 14px; font-weight: 600; }
  .tl-data-label { font-size: 11px; color: var(--muted); }
  .tl-body { padding: 0 12px 10px; }
  .tl-note { font-size: 13px; color: #5a4020; line-height: 1.5; margin-bottom: 8px; }
  .tl-foto { width: 100%; max-height: 200px; object-fit: cover; display: block; margin-bottom: 8px; }
  .btn-del-intervento {
    background: none; border: none; color: var(--red);
    font-size: 12px; padding: 0; display: flex; align-items: center; gap: 4px;
  }

  .btn-delete-pianta {
    width: 100%; background: none; border: 1.5px solid rgba(192,57,43,0.35);
    color: var(--red); border-radius: 12px; padding: 12px; font-size: 14px;
  }
  .confirm-box {
    background: #fff5f0; border-radius: 12px; padding: 16px;
    border: 1.5px solid rgba(192,57,43,0.3);
  }
  .confirm-box p { font-size: 14px; color: #7a3a2a; margin-bottom: 12px; }
  .confirm-row { display: flex; gap: 10px; }
  .btn-yes { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 600; }
  .btn-no { background: var(--border); color: var(--dark); border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; }

  /* FORM */
  .form-wrap { padding: 16px 2px 0; }
  .form-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .form-subtitle { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 6px; }
  label.lbl {
    display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 6px; margin-top: 16px;
  }
  input[type=text], input[type=date], textarea {
    width: 100%; background: var(--card); border: 1.5px solid var(--border2);
    border-radius: 10px; padding: 11px 13px; font-size: 14px;
    color: var(--dark); outline: none; appearance: none; -webkit-appearance: none;
    transition: border-color 0.18s;
  }
  input:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; }

  .segmented { display: flex; gap: 8px; }
  .seg-btn {
    flex: 1; background: var(--card); border: 1.5px solid var(--border2);
    border-radius: 10px; padding: 11px 6px; font-size: 14px; color: #5a4020;
    transition: all 0.18s;
  }
  .seg-btn.active { background: var(--gold); border-color: var(--gold); color: #1a1208; font-weight: 700; }

  .tipo-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; }
  .tipo-btn {
    background: var(--card); border: 1.5px solid var(--border2);
    border-radius: 12px; padding: 10px 3px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    color: #5a4020; font-size: 11px; transition: all 0.18s;
  }
  .tipo-btn .tipo-emoji { font-size: 22px; }
  .tipo-btn.active { background: var(--dark); border-color: var(--gold); color: var(--gold); }

  .foto-upload {
    border: 2px dashed rgba(200,168,75,0.45); border-radius: 14px;
    min-height: 110px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; transition: border-color 0.18s;
  }
  .foto-upload:active { border-color: var(--gold); }
  .foto-empty { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; }
  .foto-empty span:first-child { font-size: 34px; }
  .foto-upload img { width: 100%; max-height: 200px; object-fit: cover; display: block; }

  .btn-save {
    margin-top: 24px; width: 100%; background: var(--dark);
    color: var(--gold); border: none; border-radius: 14px;
    padding: 15px; font-size: 16px; font-weight: 700; letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(44,36,22,0.25);
  }
  .btn-save:active { transform: scale(0.98); }
  .empty-small { color: var(--muted); font-style: italic; font-size: 14px; }

  input[type=date]::-webkit-calendar-picker-indicator { filter: opacity(0.4); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">← Indietro</button>
    <div class="logo">
      <span class="logo-kanji">盆栽</span>
      <span class="logo-text">Diario Verde</span>
    </div>
    <button class="btn-add" id="btn-add-header" onclick="showView('addPlant')">+ Nuova</button>
    <div class="spacer" id="spacer-right" style="display:none"></div>
  </div>
</header>

<main>

  <!-- LIST VIEW -->
  <div class="view active" id="view-list">
    <div class="filter-row">
      <button class="chip active" onclick="setFilter('tutti',this)">🌿 Tutte</button>
      <button class="chip" onclick="setFilter('bonsai',this)">🌲 Bonsai</button>
      <button class="chip" onclick="setFilter('talea',this)">🌱 Talee</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty-state" style="display:none">
      <div class="empty-icon">🌱</div>
      <p class="empty-text">Nessuna pianta ancora.<br>Aggiungine una!</p>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail"></div>

  <!-- ADD PLANT VIEW -->
  <div class="view" id="view-addPlant">
    <div class="form-wrap">
      <div class="form-title">Nuova pianta</div>
      <label class="lbl">Foto</label>
      <div class="foto-upload" onclick="document.getElementById('foto-pianta').click()">
        <div class="foto-empty" id="foto-pianta-empty">
          <span>📷</span><span>Aggiungi foto</span>
        </div>
        <img id="foto-pianta-preview" style="display:none">
      </div>
      <input type="file" id="foto-pianta" accept="image/*" style="display:none" onchange="previewFoto('foto-pianta','foto-pianta-preview','foto-pianta-empty')">

      <label class="lbl">Categoria</label>
      <div class="segmented">
        <button class="seg-btn active" id="cat-bonsai" onclick="selectCat('bonsai')">🌲 Bonsai</button>
        <button class="seg-btn" id="cat-talea" onclick="selectCat('talea')">🌱 Talea</button>
      </div>

      <label class="lbl">Nome *</label>
      <input type="text" id="pianta-nome" placeholder="es. Ficus Benjamin">

      <label class="lbl">Specie</label>
      <input type="text" id="pianta-specie" placeholder="es. Ficus benjamina">

      <label class="lbl">Data acquisizione</label>
      <input type="date" id="pianta-data">

      <label class="lbl">Note</label>
      <textarea id="pianta-note" rows="3" placeholder="Note generali..."></textarea>

      <button class="btn-save" onclick="savePianta()">Salva pianta</button>
    </div>
  </div>

  <!-- ADD INTERVENTO VIEW -->
  <div class="view" id="view-addIntervento">
    <div class="form-wrap">
      <div class="form-title">Nuovo intervento</div>
      <div class="form-subtitle" id="intervento-subtitle"></div>

      <label class="lbl">Tipo intervento</label>
      <div class="tipo-grid" id="tipo-grid">
        <button class="tipo-btn" data-tipo="rinvaso" onclick="selectTipo('rinvaso',this)">
          <span class="tipo-emoji">🪴</span><span>Rinvaso</span>
        </button>
        <button class="tipo-btn active" data-tipo="potatura" onclick="selectTipo('potatura',this)">
          <span class="tipo-emoji">✂️</span><span>Potatura</span>
        </button>
        <button class="tipo-btn" data-tipo="legatura" onclick="selectTipo('legatura',this)">
          <span class="tipo-emoji">🪢</span><span>Legatura</span>
        </button>
        <button class="tipo-btn" data-tipo="concimazione" onclick="selectTipo('concimazione',this)">
          <span class="tipo-emoji">🌿</span><span>Concime</span>
        </button>
        <button class="tipo-btn" data-tipo="altro" onclick="selectTipo('altro',this)">
          <span class="tipo-emoji">📝</span><span>Altro</span>
        </button>
      </div>

      <label class="lbl">Data</label>
      <input type="date" id="intervento-data">

      <label class="lbl">Note</label>
      <textarea id="intervento-note" rows="3" placeholder="Descrivi l'intervento..."></textarea>

      <label class="lbl">Foto (opzionale)</label>
      <div class="foto-upload" onclick="document.getElementById('foto-intervento').click()">
        <div class="foto-empty" id="foto-int-empty">
          <span>📷</span><span>Aggiungi foto</span>
        </div>
        <img id="foto-int-preview" style="display:none">
      </div>
      <input type="file" id="foto-intervento" accept="image/*" style="display:none" onchange="previewFoto('foto-intervento','foto-int-preview','foto-int-empty')">

      <button class="btn-save" onclick="saveIntervento()">Salva intervento</button>
    </div>
  </div>

</main>

<script>
const STORAGE_KEY = 'diario-verde-v1';
const TIPI = {
  rinvaso:      { label: 'Rinvaso',      emoji: '🪴' },
  potatura:     { label: 'Potatura',     emoji: '✂️' },
  legatura:     { label: 'Legatura',     emoji: '🪢' },
  concimazione: { label: 'Concimazione', emoji: '🌿' },
  altro:        { label: 'Altro',        emoji: '📝' },
};

let piante = [];
let currentView = 'list';
let selectedId = null;
let filterCat = 'tutti';
let currentCat = 'bonsai';
let currentTipo = 'potatura';
let fotoPiantaData = '';
let fotoInterventoData = '';
let expandedInterventoId = null;
let confirmingDelete = false;

// ── STORAGE ──────────────────────────────────────────────────────────────────
function load() {
  try { piante = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { piante = []; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(piante)); } catch {}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function dataIta(s) {
  if (!s) return '—';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
}
function giorniDa(s) {
  if (!s) return null;
  return Math.floor((Date.now() - new Date(s + 'T00:00:00')) / 86400000);
}
function giorniStr(g) {
  if (g === null) return 'Nessun intervento';
  if (g === 0) return 'oggi';
  if (g === 1) return 'ieri';
  return g + 'g fa';
}
function alertColor(g) {
  if (g === null) return '#b5c4a1';
  if (g > 60) return '#c0392b';
  if (g > 30) return '#e67e22';
  return '#5a7a3a';
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function todayStr() { return new Date().toISOString().split('T')[0]; }

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  currentView = name;
  updateHeader();
  window.scrollTo(0,0);

  if (name === 'list') renderList();
  if (name === 'detail') renderDetail();
  if (name === 'addPlant') resetPlantForm();
  if (name === 'addIntervento') resetInterventoForm();
}

function goBack() {
  if (currentView === 'detail') showView('list');
  else if (currentView === 'addPlant') showView(selectedId ? 'detail' : 'list');
  else if (currentView === 'addIntervento') showView('detail');
}

function updateHeader() {
  const back = document.getElementById('btn-back');
  const addBtn = document.getElementById('btn-add-header');
  const spacer = document.getElementById('spacer-right');

  back.style.display = currentView !== 'list' ? '' : 'none';

  if (currentView === 'list') {
    addBtn.style.display = ''; addBtn.textContent = '+ Nuova';
    addBtn.onclick = () => { selectedId = null; showView('addPlant'); };
    spacer.style.display = 'none';
  } else if (currentView === 'detail') {
    addBtn.style.display = ''; addBtn.textContent = '+ Intervento';
    addBtn.onclick = () => showView('addIntervento');
    spacer.style.display = 'none';
  } else {
    addBtn.style.display = 'none';
    spacer.style.display = '';
  }
}

// ── LIST ──────────────────────────────────────────────────────────────────────
function setFilter(cat, el) {
  filterCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const filtered = filterCat === 'tutti' ? piante : piante.filter(p => p.categoria === filterCat);
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  if (filtered.length === 0) {
    grid.innerHTML = ''; empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(p => {
    const ult = p.interventi && p.interventi[0];
    const g = ult ? giorniDa(ult.data) : null;
    const tipo = ult ? (TIPI[ult.tipo] || TIPI.altro) : null;
    const imgHtml = p.foto
      ? `<img src="${p.foto}" alt="">`
      : `<span>${p.categoria === 'bonsai' ? '🌲' : '🌱'}</span>`;

    return `
      <div class="card" onclick="openDetail('${p.id}')">
        <div class="card-img">
          ${imgHtml}
          <span class="cat-badge">${esc(p.categoria)}</span>
        </div>
        <div class="card-body">
          <div class="card-nome">${esc(p.nome)}</div>
          <div class="card-specie">${esc(p.specie || '—')}</div>
          <div class="card-ultimo">
            <span class="dot" style="background:${alertColor(g)}"></span>
            ${tipo ? tipo.emoji + ' ' + giorniStr(g) : 'Nessun intervento'}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(id) {
  selectedId = id;
  expandedInterventoId = null;
  confirmingDelete = false;
  showView('detail');
}

function renderDetail() {
  const p = piante.find(x => x.id === selectedId);
  if (!p) { showView('list'); return; }

  const heroHtml = p.foto
    ? `<img src="${p.foto}" alt="">`
    : `<div class="hero-placeholder">${p.categoria === 'bonsai' ? '🌲' : '🌱'}</div>`;

  const ultimiPerTipo = {};
  (p.interventi || []).forEach(i => { if (!ultimiPerTipo[i.tipo]) ultimiPerTipo[i.tipo] = i; });

  const cureHtml = Object.keys(TIPI).map(tid => {
    const t = TIPI[tid]; const i = ultimiPerTipo[tid];
    return `<div class="cure-card">
      <div class="cure-emoji">${t.emoji}</div>
      <div class="cure-tipo">${t.label}</div>
      <div class="cure-data">${i ? dataIta(i.data) : 'Mai'}</div>
    </div>`;
  }).join('');

  const noteHtml = p.note ? `
    <div class="section">
      <div class="section-title">Note</div>
      <div class="note-box">${esc(p.note)}</div>
    </div>` : '';

  const tlHtml = (!p.interventi || p.interventi.length === 0)
    ? '<p class="empty-small">Nessun intervento registrato.</p>'
    : p.interventi.map(i => {
        const t = TIPI[i.tipo] || TIPI.altro;
        const exp = expandedInterventoId === i.id;
        const bodyHtml = exp ? `
          <div class="tl-body">
            ${i.note ? `<div class="tl-note">${esc(i.note)}</div>` : ''}
            ${i.foto ? `<img class="tl-foto" src="${i.foto}" alt="">` : ''}
            <button class="btn-del-intervento" onclick="deleteIntervento('${i.id}')">🗑 Elimina</button>
          </div>` : '';
        return `
          <div class="tl-item">
            <div class="tl-dot">${t.emoji}</div>
            <div class="tl-content">
              <div class="tl-header" onclick="toggleIntervento('${i.id}')">
                <span class="tl-tipo">${t.label}</span>
                <span class="tl-data-label">${dataIta(i.data)}</span>
              </div>
              ${bodyHtml}
            </div>
          </div>`;
      }).join('');

  const delHtml = confirmingDelete ? `
    <div class="confirm-box">
      <p>Sicuro di voler eliminare <strong>${esc(p.nome)}</strong>?</p>
      <div class="confirm-row">
        <button class="btn-yes" onclick="deletePianta()">Sì, elimina</button>
        <button class="btn-no" onclick="cancelDelete()">Annulla</button>
      </div>
    </div>` : `<button class="btn-delete-pianta" onclick="startDelete()">🗑 Elimina pianta</button>`;

  document.getElementById('view-detail').innerHTML = `
    <div class="hero">
      ${heroHtml}
      <div class="hero-overlay">
        <div class="hero-cat">${esc(p.categoria)}</div>
        <div class="hero-nome">${esc(p.nome)}</div>
        <div class="hero-specie">${esc(p.specie || '')}</div>
        <div class="hero-data">Acquisita: ${dataIta(p.dataAcquisto)}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Ultime cure</div>
      <div class="cure-grid">${cureHtml}</div>
    </div>
    ${noteHtml}
    <div class="section">
      <div class="section-title">Cronologia interventi</div>
      <div class="timeline">${tlHtml}</div>
    </div>
    <div class="section">${delHtml}</div>
  `;
}

function toggleIntervento(id) {
  expandedInterventoId = expandedInterventoId === id ? null : id;
  renderDetail();
}
function deleteIntervento(id) {
  const p = piante.find(x => x.id === selectedId);
  if (!p) return;
  p.interventi = p.interventi.filter(i => i.id !== id);
  save(); expandedInterventoId = null; renderDetail();
}
function startDelete() { confirmingDelete = true; renderDetail(); }
function cancelDelete() { confirmingDelete = false; renderDetail(); }
function deletePianta() {
  piante = piante.filter(p => p.id !== selectedId);
  save(); selectedId = null; showView('list');
}

// ── ADD PLANT ─────────────────────────────────────────────────────────────────
function resetPlantForm() {
  document.getElementById('pianta-nome').value = '';
  document.getElementById('pianta-specie').value = '';
  document.getElementById('pianta-data').value = '';
  document.getElementById('pianta-note').value = '';
  fotoPiantaData = '';
  document.getElementById('foto-pianta-preview').style.display = 'none';
  document.getElementById('foto-pianta-empty').style.display = '';
  selectCat('bonsai');
}
function selectCat(cat) {
  currentCat = cat;
  document.getElementById('cat-bonsai').classList.toggle('active', cat === 'bonsai');
  document.getElementById('cat-talea').classList.toggle('active', cat === 'talea');
}
function savePianta() {
  const nome = document.getElementById('pianta-nome').value.trim();
  if (!nome) { alert('Inserisci il nome della pianta'); return; }
  piante.push({
    id: uid(), nome,
    specie: document.getElementById('pianta-specie').value.trim(),
    categoria: currentCat,
    dataAcquisto: document.getElementById('pianta-data').value,
    note: document.getElementById('pianta-note').value.trim(),
    foto: fotoPiantaData,
    interventi: []
  });
  save(); showView('list');
}

// ── ADD INTERVENTO ────────────────────────────────────────────────────────────
function resetInterventoForm() {
  const p = piante.find(x => x.id === selectedId);
  document.getElementById('intervento-subtitle').textContent = p ? 'su ' + p.nome : '';
  document.getElementById('intervento-data').value = todayStr();
  document.getElementById('intervento-note').value = '';
  fotoInterventoData = '';
  document.getElementById('foto-int-preview').style.display = 'none';
  document.getElementById('foto-int-empty').style.display = '';
  selectTipo('potatura', document.querySelector('[data-tipo="potatura"]'));
}
function selectTipo(tipo, el) {
  currentTipo = tipo;
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
}
function saveIntervento() {
  const p = piante.find(x => x.id === selectedId);
  if (!p) return;
  p.interventi.unshift({
    id: uid(),
    tipo: currentTipo,
    data: document.getElementById('intervento-data').value || todayStr(),
    note: document.getElementById('intervento-note').value.trim(),
    foto: fotoInterventoData
  });
  save(); showView('detail');
}

// ── FOTO ──────────────────────────────────────────────────────────────────────
function previewFoto(inputId, previewId, emptyId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = e.target.result;
    if (inputId === 'foto-pianta') fotoPiantaData = data;
    else fotoInterventoData = data;
    const img = document.getElementById(previewId);
    img.src = data; img.style.display = 'block';
    document.getElementById(emptyId).style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
renderList();
updateHeader();
</script>
</body>
</html>
